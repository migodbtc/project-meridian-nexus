name: Next.js CI/CD
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches: [ main, ci ]
  pull_request:
    branches: [ main ]

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4                   # Checkout code
      - uses: actions/setup-node@v4                 # Setup Node 22 
        with:
          node-version: 22
      - uses: pnpm/action-setup@v3                  # Setup pnpm 9
        with:
          version: 9
      - id: pnpm-cache                              # Get pnpm store directory
        run: |
          STORE_PATH="$(pnpm store path)" 
          echo "pnpm store path: $STORE_PATH"
          echo "STORE_PATH=$STORE_PATH" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4                      # Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile         # Install pnpm files & modules
      - run: pnpm tsc --noEmit                      # Check types in TypeScript
      - run: pnpm build                             # Build project

  deploy-prod:
    needs: build-app
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci' # deploy only if push == main not in ci 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      # (Optional) Run your tests or Supabase DB migrations right here!
      # If these fail, the pipeline stops, and Vercel never deploys.
      - name: Apply Supabase DB migrations (prod)
        env:
          SUPABASE_PROD_URL: ${{ secrets.SUPABASE_PROD_URL }}
          SUPABASE_PROD_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_PROD_SERVICE_ROLE_KEY }}
        run: |
          if [ ! -d "supabase/migrations" ]; then
            echo "No supabase/migrations directory found; skipping migrations."
            exit 0
          fi

          pnpm dlx supabase@latest migration up \
            --db-url "$SUPABASE_PROD_URL"
      
      # End of Optional

      - name: Pull Vercel Environment Information
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}