name: Next.js CI/CD

on:
  push:
    branches: [main, ci]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nextjs-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  SUPABASE_CLI_VERSION: "2.91.2"
  SUPABASE_POOLER_HOST: "aws-1-ap-northeast-2.pooler.supabase.com:5432"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build-app:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build project
        run: pnpm build

  deploy-ci:
    needs: build-app
    if: github.event_name == 'push' && github.ref_name == 'ci'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: preview
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate migration prerequisites (ci)
        env:
          SUPABASE_ID: ${{ secrets.SUPABASE_PROD_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: |
          set -euo pipefail

          if [ ! -d "supabase/migrations" ]; then
            echo "No supabase/migrations directory found; skipping migrations."
            exit 0
          fi

          if [ -z "${SUPABASE_ID:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::warning::SUPABASE_ID or SUPABASE_DB_PASSWORD is empty for preview environment. Skipping CI migration test."
            exit 0
          fi

          NORMALIZED_SUPABASE_DB_PASSWORD=$(node -e "const p=process.env.SUPABASE_DB_PASSWORD||''; let d=p; try{d=decodeURIComponent(p)}catch{} process.stdout.write(d)")
          ENCODED_SUPABASE_DB_PASSWORD=$(node -e "process.stdout.write(encodeURIComponent(process.env.NORMALIZED_SUPABASE_DB_PASSWORD||''))")
          SUPABASE_DB_URL="postgresql://postgres.${SUPABASE_ID}:${ENCODED_SUPABASE_DB_PASSWORD}@${SUPABASE_POOLER_HOST}/postgres"

          if ! [[ "$SUPABASE_DB_URL" =~ ^postgres(ql)?:// ]]; then
            echo "::error::SUPABASE DB URL must start with postgres:// or postgresql://"
            exit 1
          fi

          DB_HOST="${SUPABASE_POOLER_HOST%%:*}"
          echo "DB host: $DB_HOST"

          if ! getent ahosts "$DB_HOST" >/dev/null 2>&1; then
            echo "::error::Cannot resolve $DB_HOST from this runner."
            exit 1
          fi

      - name: Apply Supabase DB migrations (ci)
        env:
          SUPABASE_ID: ${{ secrets.SUPABASE_PROD_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ID:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "SUPABASE_ID or SUPABASE_DB_PASSWORD is empty for preview environment. Skipping CI migration test."
            exit 0
          fi
          NORMALIZED_SUPABASE_DB_PASSWORD=$(node -e "const p=process.env.SUPABASE_DB_PASSWORD||''; let d=p; try{d=decodeURIComponent(p)}catch{} process.stdout.write(d)")
          ENCODED_SUPABASE_DB_PASSWORD=$(node -e "process.stdout.write(encodeURIComponent(process.env.NORMALIZED_SUPABASE_DB_PASSWORD||''))")
          SUPABASE_DB_URL="postgresql://postgres.${SUPABASE_ID}:${ENCODED_SUPABASE_DB_PASSWORD}@${SUPABASE_POOLER_HOST}/postgres"
          pnpm dlx supabase@${SUPABASE_CLI_VERSION} --version
          pnpm dlx supabase@${SUPABASE_CLI_VERSION} migration up --debug --db-url "$SUPABASE_DB_URL"

      - name: Pull Vercel preview environment (ci branch)
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifacts (ci branch)
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview (ci branch)
        run: npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  deploy-prod:
    needs: build-app
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate migration prerequisites
        env:
          SUPABASE_ID: ${{ secrets.SUPABASE_PROD_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: |
          set -euo pipefail

          if [ ! -d "supabase/migrations" ]; then
            echo "No supabase/migrations directory found; skipping migrations."
            exit 0
          fi

          if [ -z "${SUPABASE_ID:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::SUPABASE_ID or SUPABASE_DB_PASSWORD is empty."
            exit 1
          fi

          NORMALIZED_SUPABASE_DB_PASSWORD=$(node -e "const p=process.env.SUPABASE_DB_PASSWORD||''; let d=p; try{d=decodeURIComponent(p)}catch{} process.stdout.write(d)")
          ENCODED_SUPABASE_DB_PASSWORD=$(node -e "process.stdout.write(encodeURIComponent(process.env.NORMALIZED_SUPABASE_DB_PASSWORD||''))")
          SUPABASE_DB_URL="postgresql://postgres.${SUPABASE_ID}:${ENCODED_SUPABASE_DB_PASSWORD}@${SUPABASE_POOLER_HOST}/postgres"

          if ! [[ "$SUPABASE_DB_URL" =~ ^postgres(ql)?:// ]]; then
            echo "::error::Generated SUPABASE_DB_URL must start with postgres:// or postgresql://"
            exit 1
          fi

          DB_HOST="${SUPABASE_POOLER_HOST%%:*}"
          echo "DB host: $DB_HOST"

          if ! getent ahosts "$DB_HOST" >/dev/null 2>&1; then
            echo "::error::Cannot resolve $DB_HOST from this runner."
            exit 1
          fi

          if ! getent ahostsv4 "$DB_HOST" >/dev/null 2>&1; then
            echo "::warning::No IPv4 record detected for $DB_HOST. GitHub-hosted runners may fail if only IPv6 is available."
          fi

      - name: Apply Supabase DB migrations (prod)
        env:
          SUPABASE_ID: ${{ secrets.SUPABASE_PROD_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: |
          set -euo pipefail
          NORMALIZED_SUPABASE_DB_PASSWORD=$(node -e "const p=process.env.SUPABASE_DB_PASSWORD||''; let d=p; try{d=decodeURIComponent(p)}catch{} process.stdout.write(d)")
          ENCODED_SUPABASE_DB_PASSWORD=$(node -e "process.stdout.write(encodeURIComponent(process.env.NORMALIZED_SUPABASE_DB_PASSWORD||''))")
          SUPABASE_DB_URL="postgresql://postgres.${SUPABASE_ID}:${ENCODED_SUPABASE_DB_PASSWORD}@${SUPABASE_POOLER_HOST}/postgres"
          pnpm dlx supabase@${SUPABASE_CLI_VERSION} --version
          pnpm dlx supabase@${SUPABASE_CLI_VERSION} migration up --debug --db-url "$SUPABASE_DB_URL"

      - name: Pull Vercel production environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifacts (prod)
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
